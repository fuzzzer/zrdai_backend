name: Deploy Production
on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/lesa-assets-generator
            cd /opt/lesa-assets-generator

            if [ ! -d ".git" ]; then
              git init
              git branch -M main
            fi

            git remote remove origin 2>/dev/null || true
            git remote add origin https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

            git fetch origin --tags

            git checkout -f ${{ github.ref_name }}

            docker compose up -d --build --remove-orphans

            docker image prune -f
