version: '3.8'

services:
  backend:
    build: .
    container_name: zrdai_backend
    restart: always
    volumes:
      - ./storage:/app/storage
    env_file:
      - .env
    environment:
      - APP_ENV=production
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: zrdai_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./storage:/app/storage:ro
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge